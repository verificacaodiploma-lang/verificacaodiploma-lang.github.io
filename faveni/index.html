<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Faveni — Consulta Pública</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #061511;
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

/* ESQUERDA */
.left {
  flex: 1;
  position: relative;
}

.left::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://images.unsplash.com/photo-1523240795612-9a054b0db644") center/cover no-repeat;
  filter: blur(3px) brightness(0.6);
}

.left::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 80, 50, 0.6);
}

.overlay {
  position: relative;
  z-index: 2;
  padding: 80px;
}

.logo {
  font-size: 42px;
  font-weight: 700;
}

.slogan {
  margin-top: 20px;
  color: #4ade80;
}

/* DIREITA */
.right {
  width: 38%;
  min-width: 420px;
  background: linear-gradient(180deg, #071a14, #04110d);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.card {
  width: 85%;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(0,255,150,0.15);
}

/* Ícone */
.icon-top {
  width: 60px;
  height: 60px;
  border-radius: 15px;
  border: 1px solid rgba(0,255,150,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

h2 span { color: #22c55e; }

.subtitle {
  margin: 15px 0 25px;
  font-size: 14px;
  opacity: 0.7;
}

.input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  margin-bottom: 20px;
}

.btn {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #16a34a, #4ade80);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.resultado {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  display: none;
}

.erro {
  background: rgba(255,0,0,0.2);
}

.sucesso {
  background: rgba(0,255,150,0.1);
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <div class="overlay">
      <div class="logo">🔥 FAVENI</div>
      <div class="slogan">
        Excelência que transforma, educação que constrói o futuro.
      </div>
    </div>
  </div>

  <div class="right">
    <div class="card">

      <div class="icon-top">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="#22c55e" stroke-width="1.5"/>
          <path d="M20 20L17 17" stroke="#22c55e" stroke-width="1.5"/>
        </svg>
      </div>

      <h2>Consulta <span>Pública</span></h2>

      <div class="subtitle">
        Digite seu número de registro
      </div>

      <input id="registroInput" class="input" placeholder="Ex: 20230012345">

      <button class="btn" onclick="verificar()">VERIFICAR</button>

      <div id="resultado" class="resultado"></div>

    </div>
  </div>

</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

async function verificar(){
  const valor = document.getElementById("registroInput").value.trim();
  const box = document.getElementById("resultado");

  box.style.display = "block";
  box.classList.remove("erro","sucesso");

  if(!valor){
    box.classList.add("erro");
    box.innerHTML = "Digite um registro.";
    return;
  }

  box.innerHTML = "Buscando...";

  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("registro", valor)
    .single();

  if(error || !data){
    box.classList.add("erro");
    box.innerHTML = "Registro não encontrado.";
    return;
  }

  box.classList.add("sucesso");

  const status = data.status || "Sem status";
  const statusCor = status.toLowerCase() === "ativo" ? "lime" : "orange";

  box.innerHTML = `
    <strong>Aluno:</strong> ${data.nome || "-"}<br>
    <strong>Curso:</strong> ${data.curso || "-"}<br>
    <strong>Status:</strong> <span style="color:${statusCor}">${status}</span>
  `;
}
</script>

</body>
</html>
