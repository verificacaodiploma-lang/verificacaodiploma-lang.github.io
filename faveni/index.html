<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Faveni — Consulta Pública</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #061511;
  color: white;
  overflow: hidden;
}

.container {
  display: flex;
  height: 100vh;
}

/* ESQUERDA */
.left {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.left::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://images.unsplash.com/photo-1523240795612-9a054b0db644") center/cover no-repeat;
  filter: blur(3px) brightness(0.6);
  transform: scale(1.1);
}

.left::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 80, 50, 0.6);
}

.overlay {
  position: relative;
  z-index: 2;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 42px;
  font-weight: 700;
}

.logo span {
  font-size: 14px;
  opacity: 0.7;
  display: block;
}

.slogan {
  margin-top: 20px;
  color: #4ade80;
  max-width: 400px;
}

.footer-left {
  position: absolute;
  bottom: 40px;
  left: 80px;
  font-size: 14px;
  opacity: 0.7;
}

/* DIREITA */
.right {
  width: 38%;
  min-width: 420px;
  background: linear-gradient(180deg, #071a14, #04110d);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.card {
  width: 85%;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(0,255,150,0.15);
  box-shadow: 0 0 40px rgba(0,255,150,0.1);
  backdrop-filter: blur(20px);
}

/* Ícone topo */
.icon-top {
  width: 60px;
  height: 60px;
  border-radius: 15px;
  border: 1px solid rgba(0,255,150,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

/* TÍTULO */
h2 {
  margin: 0;
  font-size: 28px;
}

h2 span {
  color: #22c55e;
}

.subtitle {
  margin: 15px 0 25px;
  font-size: 14px;
  opacity: 0.7;
}

/* INPUT */
.input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  margin-bottom: 20px;
}

/* BOTÃO */
.btn {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #16a34a, #4ade80);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

/* FOOTER CARD */
.card-footer {
  margin-top: 30px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0.7;
  font-size: 13px;
}

/* QUADRADO DECORATIVO */
.square {
  position: absolute;
  top: 120px;
  right: 450px;
  width: 40px;
  height: 40px;
  border: 1px solid rgba(0,255,150,0.2);
  border-radius: 10px;
  transform: rotate(25deg);
}

@media(max-width:900px){
  .container { flex-direction: column; }
  .right { width: 100%; }
}
</style>
</head>

<body>

<div class="container">

  <!-- ESQUERDA -->
  <div class="left">
    <div class="overlay">

      <div class="logo">
        🔥 FAVENI
      </div>
      <div style="opacity:.7">Faculdade Venda Nova do Imigrante</div>

      <div class="slogan">
        Excelência que transforma, educação que constrói o futuro.
      </div>

      <div class="footer-left">
        ● EAD Faveni 2018
      </div>

    </div>
  </div>

  <!-- DIREITA -->
  <div class="right">

    <div class="card">

      <div class="icon-top">📄</div>

      <h2>Consulta <span>Pública</span></h2>

      <div class="subtitle">
        Digite o número do seu registro acadêmico para consultar suas informações.
      </div>

      <input class="input" placeholder="Ex: 20230012345">

      <button class="btn">VERIFICAR</button>

      <div class="card-footer">
        🔒 Seus dados estão protegidos e utilizados apenas para consulta.
      </div>

    </div>

  </div>

  <!-- DECOR -->
  <div class="square"></div>

</div>

</body>
</html>
