<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Faveni — Consulta Pública</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #061511;
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

/* ESQUERDA */
.left {
  flex: 1;
  background: url("https://images.unsplash.com/photo-1523240795612-9a054b0db644") center/cover no-repeat;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(6,21,17,0.95) 0%, rgba(6,21,17,0.8) 40%, rgba(6,21,17,0.3) 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px;
}

.overlay h1 {
  font-size: 56px;
  margin: 0;
  font-weight: 700;
  letter-spacing: 2px;
}

.overlay p {
  opacity: 0.7;
  font-size: 16px;
  margin-top: 10px;
}

/* DIREITA */
.right {
  width: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* PAINEL */
.panel {
  width: 90%;
  padding: 35px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.panel h2 {
  margin: 0 0 10px;
  font-weight: 600;
}

.panel h2 span {
  color: #22c55e;
}

.panel p {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: white;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #22c55e;
  background: rgba(255,255,255,0.06);
}

/* BOTÃO */
button {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #16a34a, #22c55e);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 20px rgba(34,197,94,0.4);
}

button:disabled {
  opacity: 0.5;
}

/* LOADING */
.loading {
  display: none;
  text-align: center;
  margin-top: 10px;
}

.spinner {
  width: 30px;
  height: 30px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #22c55e;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* RESULTADO */
.resultado {
  margin-top: 20px;
  background: rgba(255,255,255,0.04);
  padding: 15px;
  border-radius: 12px;
  display: none;
}

.field { margin-bottom: 10px; }

.label {
  font-size: 11px;
  opacity: 0.5;
}

.value {
  font-weight: 600;
}

.status {
  margin-bottom: 10px;
  font-weight: 600;
}

.ok { color: #4ade80; }
.warn { color: #f87171; }

#error {
  color: #f87171;
  margin-top: 10px;
}

/* MOBILE */
@media(max-width:900px){
  .container { flex-direction: column; }
  .right { width: 100%; padding: 30px 0; }
  .overlay { padding: 40px; }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <div class="overlay">
      <h1>FAVENI</h1>
      <p>Faculdade Venda Nova do Imigrante</p>
    </div>
  </div>

  <div class="right">
    <div class="panel">

      <h2>Consulta <span>Pública</span></h2>
      <p>Digite o número do seu registro acadêmico para consultar suas informações.</p>

      <input id="codigo" placeholder="Ex: 20230012345">
      <button id="btnVerificar" onclick="verificar()">VERIFICAR</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Verificando...</p>
      </div>

      <div id="error"></div>

      <div class="resultado" id="resultado">

        <div id="status" class="status ok">● Diploma ativo</div>

        <div class="field"><div class="label">Nome</div><div id="nome" class="value"></div></div>
        <div class="field"><div class="label">Instituição</div><div id="instituicao" class="value"></div></div>
        <div class="field"><div class="label">Curso</div><div id="curso" class="value"></div></div>
        <div class="field"><div class="label">Conclusão</div><div id="conclusao" class="value"></div></div>
        <div class="field"><div class="label">Registro</div><div id="registro" class="value"></div></div>
        <div class="field"><div class="label">Protocolo</div><div id="protocolo" class="value"></div></div>

        <div id="qrcode"></div>

        <button id="btnPrint" onclick="imprimir()">Imprimir</button>

      </div>

    </div>
  </div>

</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

let atual = null;

function gerarProtocolo(){
  return "FAV-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

function normalizar(v){
  return String(v).replace(/[^a-zA-Z0-9]/g,"").toUpperCase();
}

async function verificar(){

  const codigo = document.getElementById("codigo").value.trim();
  const error = document.getElementById("error");
  const loading = document.getElementById("loading");
  const btn = document.getElementById("btnVerificar");

  if(!codigo){
    error.innerText="Digite um código válido";
    return;
  }

  error.innerText="";
  loading.style.display="block";
  btn.disabled = true;

  const { data } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug","faveni");

  const aluno = data.find(a => normalizar(a.registro) === normalizar(codigo));

  loading.style.display="none";
  btn.disabled = false;

  if(!aluno){
    error.innerText="Registro não encontrado.";
    return;
  }

  atual = aluno;

  document.getElementById("resultado").style.display="block";
  document.getElementById("nome").innerText=aluno.nome;
  document.getElementById("instituicao").innerText=aluno.universidade;
  document.getElementById("curso").innerText=aluno.curso;
  document.getElementById("conclusao").innerText=aluno.conclusao;
  document.getElementById("registro").innerText=aluno.registro;

  const protocolo = gerarProtocolo();
  document.getElementById("protocolo").innerText=protocolo;

  document.getElementById("qrcode").innerHTML="";
  new QRCode(document.getElementById("qrcode"),{
    text:protocolo,width:100,height:100
  });

  if(aluno.mensalidade_atrasada){
    document.getElementById("status").className="status warn";
    document.getElementById("status").innerText="● Aguardando pagamento";
    document.getElementById("btnPrint").disabled=true;
  } else {
    document.getElementById("status").className="status ok";
    document.getElementById("status").innerText="● Diploma ativo";
    document.getElementById("btnPrint").disabled=false;
  }
}

function imprimir(){

  if(atual && atual.mensalidade_atrasada){
    alert("Aguardando pagamento.");
    return;
  }

  const conteudo = `
    <html>
    <head>
      <title>Diploma</title>
      <style>
        body { font-family: Arial; padding: 30px; color: #000; }
        h2 { text-align: center; margin-bottom: 30px; }
        .field { margin-bottom: 10px; }
        .label { font-size: 12px; color: #555; }
        .value { font-weight: bold; font-size: 16px; }
        .status { margin-bottom: 20px; font-weight: bold; }
      </style>
    </head>

    <body>
      <h2>Faculdade Faveni</h2>
      <div class="status">${document.getElementById("status").innerText}</div>

      <div class="field"><div class="label">Nome</div><div class="value">${atual.nome}</div></div>
      <div class="field"><div class="label">Instituição</div><div class="value">${atual.universidade}</div></div>
      <div class="field"><div class="label">Curso</div><div class="value">${atual.curso}</div></div>
      <div class="field"><div class="label">Conclusão</div><div class="value">${atual.conclusao}</div></div>
      <div class="field"><div class="label">Registro</div><div class="value">${atual.registro}</div></div>
      <div class="field"><div class="label">Protocolo</div><div class="value">${document.getElementById("protocolo").innerText}</div></div>
    </body>
    </html>
  `;

  const win = window.open("", "", "width=800,height=600");
  win.document.write(conteudo);
  win.document.close();
  win.print();
}
</script>

</body>
</html>
