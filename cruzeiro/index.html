<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Cruzeiro do Sul — Validação de Diplomas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--azul:#0a2e6e;
--azul2:#123c8c;
--bg:#f4f7fb;
--card:#ffffff;
--border:#e5e7eb;
--ok:#15803d;
--error:#b91c1c;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg);
}

/* TOPO */
.topbar{
background:#061a3a;
color:#fff;
padding:8px 40px;
font-size:13px;
display:flex;
justify-content:space-between;
}

/* NAV */
.nav{
background:var(--azul);
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:700;
}

.menu{
display:flex;
gap:25px;
font-size:14px;
}

/* HERO */
.hero{
display:flex;
padding:50px 40px;
background:linear-gradient(90deg,var(--azul),var(--azul2));
color:white;
gap:40px;
}

.hero-left{flex:2;}
.hero-right{flex:1;display:flex;flex-direction:column;gap:15px;}

.hero h1{margin:0;font-size:34px;}

.card-banner{
background:white;
color:black;
padding:15px;
border-radius:10px;
}

/* CONSULTA */
.consulta{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
}

.input{
width:100%;
padding:12px;
border:1px solid var(--border);
border-radius:6px;
margin-bottom:10px;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:var(--azul);
color:white;
font-weight:600;
cursor:pointer;
}

/* RESULTADO */
.resultado{
margin-top:20px;
padding:15px;
border-radius:8px;
display:none;
}

.ok{background:#dcfce7;}
.warn{background:#fee2e2;}

/* CONTEÚDO */
.container{
max-width:1100px;
margin:30px auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

canvas{
margin-top:10px;
background:white;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
.hero{flex-direction:column;}
}
</style>
</head>

<body>

<div class="topbar">
<span>Acessibilidade • A+ A-</span>
<span>Portal Acadêmico</span>
</div>

<div class="nav">
<div class="logo">Cruzeiro do Sul</div>
<div class="menu">
<div>Cursos</div>
<div>Institucional</div>
<div>Contato</div>
</div>
</div>

<div class="hero">

<div class="hero-left">
<h1>Validação de Diplomas</h1>
<p>Consulte a autenticidade do seu diploma emitido pela instituição.</p>

<div class="consulta">
<input id="q" class="input" placeholder="Digite o número do diploma">
<button class="btn" onclick="verificar()">Consultar</button>

<div id="erro" style="color:red;margin-top:10px;"></div>
<div id="resultado" class="resultado"></div>
</div>
</div>

<div class="hero-right">
<div class="card-banner"><strong>Ensino de excelência</strong><br>Construa seu futuro</div>
<div class="card-banner">Processo seletivo aberto</div>
</div>

</div>

<div class="container">

<div class="grid">

<div class="card">

<h2 id="nome">—</h2>
<div id="curso"></div>
<div id="inst"></div>
<div id="data"></div>

<div id="status" style="margin-top:10px;font-weight:bold;"></div>

<div id="registro"></div>
<div id="protocolo"></div>

<div id="qrcode"></div>

<button id="printBtn" onclick="imprimir()" style="margin-top:10px;">Imprimir</button>

<div id="bloqueio" style="display:none;color:red;margin-top:10px;">
Aguardando pagamento
</div>

</div>

<div class="card">
<canvas id="canvas" width="420" height="260"></canvas>
</div>

</div>

</div>

<script>
const banco = window.supabase.createClient(
"https://fghkqwxhrdodyhvfrlzz.supabase.co",
"sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

const ctx = document.getElementById("canvas").getContext("2d");
let atual = null;

function gerarProtocolo(){
return "CRZ-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

function normalizar(v){
return String(v).replace(/[^a-zA-Z0-9]/g,"").toUpperCase();
}

function desenhar(d){
ctx.clearRect(0,0,420,260);

ctx.fillStyle="#0a2e6e";
ctx.font="bold 18px Arial";
ctx.fillText("CRUZEIRO DO SUL",90,40);

ctx.font="14px Arial";
ctx.fillText(d.nome,40,120);
ctx.fillText(d.curso,40,150);
}

async function verificar(){

const codigo = document.getElementById("q").value.trim();
const erro = document.getElementById("erro");

erro.innerText="";

const { data } = await banco
.from("registros")
.select("*")
.eq("universidade_slug","cruzeiro");

const aluno = data.find(a => normalizar(a.registro) === normalizar(codigo));

if(!aluno){
erro.innerText="Diploma não encontrado.";
return;
}

atual = aluno;

document.getElementById("nome").innerText=aluno.nome;
document.getElementById("curso").innerText=aluno.curso;
document.getElementById("inst").innerText=aluno.universidade;
document.getElementById("data").innerText=aluno.conclusao;
document.getElementById("registro").innerText=aluno.registro;

const protocolo = gerarProtocolo();
document.getElementById("protocolo").innerText=protocolo;

document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text:protocolo,width:100,height:100
});

if(aluno.mensalidade_atrasada){
document.getElementById("status").innerText="Aguardando pagamento";
document.getElementById("bloqueio").style.display="block";
document.getElementById("printBtn").disabled=true;
}else{
document.getElementById("status").innerText="Ativo";
document.getElementById("bloqueio").style.display="none";
document.getElementById("printBtn").disabled=false;
}

desenhar(aluno);
}

function imprimir(){
if(atual && atual.mensalidade_atrasada){
alert("Pagamento pendente.");
return;
}
window.print();
}
</script>

</body>
</html>
