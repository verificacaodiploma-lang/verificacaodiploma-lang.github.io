<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ficha do Aluno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef3f9;
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
  box-sizing:border-box;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.salvar{
  background:#005daa;
  color:#fff;
  width:100%;
  margin-bottom:10px;
}

.excluir{
  background:#b91c1c;
  color:#fff;
  width:100%;
}

.voltar{
  background:#111827;
  color:#fff;
  margin-bottom:15px;
}

h2{
  margin-top:0;
}

#msg{
  margin-top:12px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <button class="voltar" onclick="voltar()">⬅ Voltar</button>

  <div class="card">
    <h2>Ficha do Aluno</h2>

    <input id="nome" placeholder="Nome do aluno">
    <input id="curso" placeholder="Curso">
    <input id="registro" placeholder="Número de registro">

    <label>Data de conclusão</label>
    <input type="date" id="conclusao">

    <input id="polo" placeholder="Polo">

    <select id="status">
      <option value="Ativo">Ativo</option>
      <option value="Concluído">Concluído</option>
    </select>

    <label>
      <input type="checkbox" id="mensalidade">
      Aguardando pagamento
    </label>

    <textarea id="obs" placeholder="Observações"></textarea>

    <button class="salvar" onclick="salvar()">Salvar alterações</button>
    <button class="excluir" onclick="excluirAluno()">Excluir aluno</button>

    <div id="msg"></div>
  </div>

</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

async function carregarAluno(){
  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("id", id)
    .single();

  if(error){
    alert("Erro ao carregar aluno");
    console.error(error);
    return;
  }

  document.getElementById("nome").value = data.nome || "";
  document.getElementById("curso").value = data.curso || "";
  document.getElementById("registro").value = data.registro || "";
  document.getElementById("conclusao").value = data.conclusao || "";
  document.getElementById("polo").value = data.polo || "";
  document.getElementById("status").value = data.status || "Ativo";
  document.getElementById("mensalidade").checked = data.mensalidade_atrasada || false;
  document.getElementById("obs").value = data.observacoes || "";
}

async function salvar(){
  const { error } = await banco
    .from("registros")
    .update({
      nome: document.getElementById("nome").value,
      curso: document.getElementById("curso").value,
      registro: document.getElementById("registro").value,
      conclusao: document.getElementById("conclusao").value,
      polo: document.getElementById("polo").value,
      status: document.getElementById("status").value,
      mensalidade_atrasada: document.getElementById("mensalidade").checked,
      observacoes: document.getElementById("obs").value
    })
    .eq("id", id);

  if(error){
    document.getElementById("msg").innerText = "Erro ao salvar";
    document.getElementById("msg").style.color = "red";
    console.error(error);
    return;
  }

  document.getElementById("msg").innerText = "Salvo com sucesso!";
  document.getElementById("msg").style.color = "green";
}

async function excluirAluno(){
  const confirmar = confirm("Tem certeza que deseja excluir este aluno? Essa ação não poderá ser desfeita.");

  if(!confirmar){
    return;
  }

  const { error } = await banco
    .from("registros")
    .delete()
    .eq("id", id);

  if(error){
    alert("Erro ao excluir aluno");
    console.error(error);
    return;
  }

  alert("Aluno excluído com sucesso!");
  window.location.href = "index.html";
}

function voltar(){
  window.location.href = "index.html";
}

carregarAluno();
</script>

</body>
</html>
