<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ficha do Aluno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef3f9;
}

.container{
  max-width:850px;
  margin:40px auto;
  padding:20px;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.card{
  background:#fff;
  padding:24px;
  border-radius:12px;
  box-shadow:0 10px 24px rgba(0,0,0,.06);
}

h2{
  margin:0 0 20px 0;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.campo-full{
  grid-column:1 / -1;
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
  color:#374151;
}

input, select, textarea{
  width:100%;
  padding:12px;
  border:1px solid #d1d5db;
  border-radius:8px;
  font-size:14px;
  box-sizing:border-box;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.checkbox-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.checkbox-wrap input{
  width:auto;
  margin:0;
}

.botoes{
  display:flex;
  gap:12px;
  margin-top:22px;
  flex-wrap:wrap;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.voltar{
  background:#111827;
  color:#fff;
}

.salvar{
  background:#005daa;
  color:#fff;
}

.excluir{
  background:#b91c1c;
  color:#fff;
}

#msg{
  margin-top:14px;
  font-weight:bold;
}

@media (max-width: 700px){
  .grid{
    grid-template-columns:1fr;
  }

  .botoes{
    flex-direction:column;
  }

  .botoes button{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <h1 style="margin:0;font-size:28px;">Ficha do Aluno</h1>
    <button class="voltar" onclick="voltar()">⬅ Voltar</button>
  </div>

  <div class="card">
    <h2>Dados cadastrais</h2>

    <div class="grid">
      <div class="campo-full">
        <label for="nome">Nome do aluno</label>
        <input id="nome" placeholder="Nome do aluno">
      </div>

      <div>
        <label for="curso">Curso</label>
        <input id="curso" placeholder="Curso">
      </div>

      <div>
        <label for="registro">Número de registro</label>
        <input id="registro" placeholder="Número de registro">
      </div>

      <div>
        <label for="conclusao">Data de conclusão</label>
        <input type="date" id="conclusao">
      </div>

      <div>
        <label for="polo">Polo</label>
        <input id="polo" placeholder="Polo">
      </div>

      <div>
        <label for="status">Status</label>
        <select id="status">
          <option value="Ativo">Ativo</option>
          <option value="Concluído">Concluído</option>
        </select>
      </div>

      <div class="campo-full">
        <label>Situação financeira</label>
        <div class="checkbox-wrap">
          <input type="checkbox" id="mensalidade">
          <span>Aguardando pagamento</span>
        </div>
      </div>

      <div class="campo-full">
        <label for="obs">Observações</label>
        <textarea id="obs" placeholder="Observações"></textarea>
      </div>
    </div>

    <div class="botoes">
      <button class="salvar" onclick="salvar()">Salvar alterações</button>
      <button class="excluir" onclick="excluirAluno()">Excluir aluno</button>
    </div>

    <div id="msg"></div>
  </div>

</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

async function carregarAluno(){
  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("id", id)
    .single();

  if(error){
    alert("Erro ao carregar aluno");
    console.error(error);
    return;
  }

  document.getElementById("nome").value = data.nome || "";
  document.getElementById("curso").value = data.curso || "";
  document.getElementById("registro").value = data.registro || "";
  document.getElementById("conclusao").value = data.conclusao || "";
  document.getElementById("polo").value = data.polo || "";
  document.getElementById("status").value = data.status || "Ativo";
  document.getElementById("mensalidade").checked = data.mensalidade_atrasada || false;
  document.getElementById("obs").value = data.observacoes || "";
}

async function salvar(){
  const msg = document.getElementById("msg");
  msg.innerText = "";
  msg.style.color = "";

  const { error } = await banco
    .from("registros")
    .update({
      nome: document.getElementById("nome").value.trim(),
      curso: document.getElementById("curso").value.trim(),
      registro: document.getElementById("registro").value.trim(),
      conclusao: document.getElementById("conclusao").value,
      polo: document.getElementById("polo").value.trim(),
      status: document.getElementById("status").value,
      mensalidade_atrasada: document.getElementById("mensalidade").checked,
      observacoes: document.getElementById("obs").value.trim()
    })
    .eq("id", id);

  if(error){
    msg.innerText = "Erro ao salvar: " + (error.message || "erro desconhecido");
    msg.style.color = "red";
    console.error(error);
    return;
  }

  msg.innerText = "Salvo com sucesso!";
  msg.style.color = "green";
}

async function excluirAluno(){
  const confirmar = confirm("Tem certeza que deseja excluir este aluno? Essa ação não poderá ser desfeita.");

  if(!confirmar){
    return;
  }

  const { error } = await banco
    .from("registros")
    .delete()
    .eq("id", id);

  if(error){
    alert("Erro ao excluir aluno");
    console.error(error);
    return;
  }

  alert("Aluno excluído com sucesso!");
  window.location.href = "index.html";
}

function voltar(){
  window.location.href = "index.html";
}

carregarAluno();
</script>

</body>
</html>
