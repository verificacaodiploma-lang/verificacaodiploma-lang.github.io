<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação de Diploma</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #020617;
  --blue: #3b82f6;
  --blue-strong: #2563eb;
  --text: #e5e7eb;
  --muted: #94a3b8;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: radial-gradient(circle at top, #0b1120, #020617);
  color: var(--text);
}

/* LAYOUT */
.container {
  display: flex;
  min-height: 100vh;
}

/* ESQUERDA */
.left {
  flex: 1;
  background: url('https://images.unsplash.com/photo-1523240795612-9a054b0db644') center/cover;
  position: relative;
}

.left::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(2,6,23,0.95), rgba(2,6,23,0.5));
}

.left-content {
  position: relative;
  z-index: 2;
  padding: 90px 70px;
  max-width: 520px;
}

.left small {
  color: var(--blue);
  letter-spacing: 2px;
  font-size: 12px;
}

.left h1 {
  font-size: 52px;
  margin: 10px 0;
}

.left p {
  color: var(--muted);
  line-height: 1.6;
}

/* DIREITA */
.right {
  width: 480px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.card {
  width: 100%;
  margin: 20px;
  padding: 35px;
  border-radius: 18px;
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(59,130,246,0.2);
  box-shadow: 0 0 40px rgba(59,130,246,0.15);
}

/* TÍTULO */
.card h2 {
  font-size: 24px;
  margin-bottom: 5px;
}

.card h2 span {
  color: var(--blue);
}

.sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  color: white;
  outline: none;
}

input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 10px rgba(59,130,246,0.4);
}

/* BOTÃO */
button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: var(--blue-strong);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: var(--blue);
}

/* RESULTADO */
.result {
  margin-top: 25px;
  display: none;
}

.field {
  margin-bottom: 10px;
}

.label {
  font-size: 12px;
  color: var(--muted);
}

.value {
  font-weight: bold;
}

/* ERRO */
.error {
  color: #f87171;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <div class="left-content">
      <small>SISTEMA DE VERIFICAÇÃO</small>
      <h1>Verificação<br>de Diploma</h1>
      <p>Consulte a autenticidade de diplomas emitidos pela instituição.</p>
    </div>
  </div>

  <div class="right">
    <div class="card">

      <h2>Consulta <span>Pública</span></h2>
      <div class="sub">Digite o número do registro acadêmico</div>

      <input type="text" id="codigo" placeholder="Ex: 20230012345">

      <button onclick="verificar()">VERIFICAR</button>

      <div id="erro" class="error"></div>

      <div id="resultado" class="result">
        <div class="field">
          <div class="label">Nome</div>
          <div id="nome" class="value"></div>
        </div>

        <div class="field">
          <div class="label">Instituição</div>
          <div id="instituicao" class="value"></div>
        </div>

        <div class="field">
          <div class="label">Curso</div>
          <div id="curso" class="value"></div>
        </div>

        <div class="field">
          <div class="label">Conclusão</div>
          <div id="conclusao" class="value"></div>
        </div>

        <div class="field">
          <div class="label">Registro</div>
          <div id="registro" class="value"></div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "SUA_URL_AQUI",
  "SUA_ANON_KEY_AQUI"
);

async function verificar() {
  const codigo = document.getElementById("codigo").value.trim();
  const erro = document.getElementById("erro");
  const resultado = document.getElementById("resultado");

  erro.innerText = "";
  resultado.style.display = "none";

  if (!codigo) {
    erro.innerText = "Digite um número de registro.";
    return;
  }

  const { data, error } = await supabase
    .from("diplomas")
    .select("*")
    .eq("registro", codigo)
    .single();

  if (error || !data) {
    erro.innerText = "Registro não encontrado.";
    return;
  }

  nome.innerText = data.nome;
  instituicao.innerText = data.instituicao;
  curso.innerText = data.curso;
  conclusao.innerText = data.conclusao;
  registro.innerText = data.registro;

  resultado.style.display = "block";
}
</script>

</body>
</html>
