<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel ADM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef3f9;
}

.container{
  max-width:900px;
  margin:40px auto;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.btn{
  padding:20px;
  background:#005daa;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">

  <div id="loginBox" class="card">
    <h2>Login ADM</h2>
    <input id="email" placeholder="Email"><br><br>
    <input id="senha" type="password" placeholder="Senha"><br><br>
    <button onclick="login()">Entrar</button>
  </div>

  <div id="painel" class="card" style="display:none;">
    <h2>Universidades</h2>

    <div class="grid">
      <button class="btn" onclick="abrirUniversidade('estacio')">Estácio</button>
      <button class="btn" onclick="abrirUniversidade('usp')">USP</button>
      <button class="btn" onclick="abrirUniversidade('anhanguera')">Anhanguera</button>
    </div>

    <br>
    <button onclick="logout()">Sair</button>
  </div>

  <div id="listaAlunos" class="card" style="display:none;">
    <h2 id="tituloUniversidade"></h2>

    <button onclick="voltar()">⬅ Voltar</button>
    <br><br>

    <div id="alunos"></div>

    <br>
    <button onclick="novoAluno()">+ Novo aluno</button>
  </div>

</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

let universidadeAtual = "";

async function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await banco.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if(error){
    alert("Erro no login");
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("painel").style.display = "block";
}

async function logout(){
  await banco.auth.signOut();
  location.reload();
}

async function abrirUniversidade(slug){
  universidadeAtual = slug;

  document.getElementById("painel").style.display = "none";
  document.getElementById("listaAlunos").style.display = "block";
  document.getElementById("tituloUniversidade").innerText = slug.toUpperCase();

  carregarAlunos();
}

function voltar(){
  document.getElementById("listaAlunos").style.display = "none";
  document.getElementById("painel").style.display = "block";
}

async function carregarAlunos(){
  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug", universidadeAtual);

  if(error){
    alert("Erro ao carregar alunos");
    console.error(error);
    return;
  }

  let html = "";

  if(!data || data.length === 0){
    html = "<div>Nenhum aluno cadastrado.</div>";
  } else {
    data.forEach(aluno => {
      html += `
        <div onclick="editarAluno(${aluno.id})"
          style="padding:10px;border-bottom:1px solid #ddd;cursor:pointer;">
          ${aluno.nome} - ${aluno.curso}
        </div>
      `;
    });
  }

  document.getElementById("alunos").innerHTML = html;
}

function novoAluno(){
  alert("Vamos criar o formulário no próximo passo 😄");
}

async function editarAluno(id){
  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("id", id)
    .single();

  if(error){
    alert("Erro ao buscar aluno");
    console.error(error);
    return;
  }

  const aluno = data;

  const nome = prompt("Nome:", aluno.nome || "");
  if (nome === null) return;

  const curso = prompt("Curso:", aluno.curso || "");
  if (curso === null) return;

  const status = prompt("Status (Ativo/Concluído):", aluno.status || "");
  if (status === null) return;

  const atrasado = confirm("Mensalidade atrasada?");

  const { error: updateError } = await banco
    .from("registros")
    .update({
      nome: nome,
      curso: curso,
      status: status,
      mensalidade_atrasada: atrasado
    })
    .eq("id", id);

  if(updateError){
    alert("Erro ao atualizar aluno");
    console.error(updateError);
    return;
  }

  alert("Atualizado!");
  carregarAlunos();
}
</script>

</body>
</html>
