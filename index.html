<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel ADM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef3f9;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 10px 24px rgba(0,0,0,.06);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.btn{
  padding:16px;
  background:#005daa;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.btn-sec{
  padding:12px 16px;
  background:#111827;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.item-aluno{
  padding:12px;
  border-bottom:1px solid #e5e7eb;
  cursor:pointer;
  border-radius:6px;
}

.item-aluno:hover{
  background:#f8fafc;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.busca{
  width:100%;
  padding:12px;
  border:1px solid #d1d5db;
  border-radius:8px;
  font-size:14px;
  margin-bottom:14px;
}

.link{
  margin-top:10px;
  color:#005daa;
  cursor:pointer;
  text-decoration:underline;
  font-size:14px;
}

.badge{
  font-size:12px;
  font-weight:bold;
}

#mensagemLogin{
  margin-top:10px;
  color:#b91c1c;
}

#mensagemReset{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>Login ADM</h2>

  <input id="email" placeholder="Email" style="width:100%;padding:12px;">
  <br><br>

  <input id="senha" type="password" placeholder="Senha" style="width:100%;padding:12px;">
  <br><br>

  <button class="btn" onclick="login()">Entrar</button>

  <div class="link" onclick="esqueciSenha()">Esqueci minha senha</div>

  <div id="mensagemLogin"></div>
  <div id="mensagemReset"></div>
</div>

<!-- PAINEL -->
<div id="painel" class="card" style="display:none;">
  <div class="topo">
    <h2>Universidades</h2>
    <button class="btn-sec" onclick="logout()">Sair</button>
  </div>

  <div class="grid">
    <button class="btn" onclick="abrirUniversidade('estacio','Estácio')">Estácio</button>
    <button class="btn" onclick="abrirUniversidade('usp','USP')">USP</button>
    <button class="btn" onclick="abrirUniversidade('anhanguera','Anhanguera')">Anhanguera</button>
  </div>
</div>

<!-- LISTA -->
<div id="listaAlunos" class="card" style="display:none;">
  <div class="topo">
    <h2 id="tituloUniversidade"></h2>
    <button class="btn-sec" onclick="voltar()">⬅ Voltar</button>
  </div>

  <input class="busca" id="buscaAluno" placeholder="Buscar aluno..." oninput="filtrarAlunos()">

  <div id="alunos"></div>

  <br>
  <button class="btn" onclick="novoAluno()">+ Novo aluno</button>
</div>

</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

let universidadeAtual = "";
let alunosCache = [];

async function verificarSessao(){
  const { data } = await banco.auth.getSession();

  if(data.session){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("painel").style.display="block";
  }
}

async function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await banco.auth.signInWithPassword({
    email, password: senha
  });

  if(error){
    document.getElementById("mensagemLogin").innerText = error.message;
    return;
  }

  document.getElementById("loginBox").style.display="none";
  document.getElementById("painel").style.display="block";
}

async function esqueciSenha(){
  const email = document.getElementById("email").value;

  if(!email){
    document.getElementById("mensagemReset").innerText = "Digite seu email";
    return;
  }

  const { error } = await banco.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/redefinir-senha.html"
  });

  if(error){
    document.getElementById("mensagemReset").innerText = error.message;
    return;
  }

  document.getElementById("mensagemReset").innerText = "Email enviado!";
}

async function logout(){
  await banco.auth.signOut();
  location.reload();
}

async function abrirUniversidade(slug, nome){
  universidadeAtual = slug;

  document.getElementById("painel").style.display="none";
  document.getElementById("listaAlunos").style.display="block";

  document.getElementById("tituloUniversidade").innerText = nome;

  carregarAlunos();
}

function voltar(){
  document.getElementById("listaAlunos").style.display="none";
  document.getElementById("painel").style.display="block";
}

async function carregarAlunos(){
  const { data } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug", universidadeAtual)
    .order("nome");

  alunosCache = data;
  renderizarAlunos(data);
}

function filtrarAlunos(){
  const termo = document.getElementById("buscaAluno").value.toLowerCase();

  const filtrados = alunosCache.filter(a =>
    (a.nome || "").toLowerCase().includes(termo)
  );

  renderizarAlunos(filtrados);
}

function renderizarAlunos(lista){
  let html = "";

  lista.forEach(aluno => {
    html += `
      <div class="item-aluno" onclick="abrirAluno(${aluno.id})">
        <strong>${aluno.nome}</strong><br>
        ${aluno.curso}<br>
        ${aluno.mensalidade_atrasada 
          ? '<span style="color:red;">🔴 Aguardando pagamento</span>'
          : '<span style="color:green;">🟢 Regular</span>'}
      </div>
    `;
  });

  document.getElementById("alunos").innerHTML = html;
}

function abrirAluno(id){
  window.location.href = "aluno.html?id=" + id;
}

function novoAluno(){
  window.location.href = "novo-aluno.html?universidade=" + universidadeAtual;
}

verificarSessao();
</script>

</body>
</html>
