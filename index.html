<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel ADM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef3f9;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 10px 24px rgba(0,0,0,.06);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.btn{
  padding:16px;
  background:#005daa;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.btn-sec{
  padding:12px 16px;
  background:#111827;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.item-aluno{
  padding:12px;
  border-bottom:1px solid #e5e7eb;
  cursor:pointer;
  border-radius:6px;
}

.item-aluno:hover{
  background:#f8fafc;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

#mensagem{
  margin-top:10px;
  color:#6b7280;
}

@media (max-width: 640px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div id="loginBox" class="card">
    <h2>Login ADM</h2>
    <input id="email" type="email" placeholder="Email" style="width:100%;padding:12px;box-sizing:border-box;"><br><br>
    <input id="senha" type="password" placeholder="Senha" style="width:100%;padding:12px;box-sizing:border-box;"><br><br>
    <button class="btn" onclick="login()">Entrar</button>
    <div id="mensagemLogin" style="margin-top:10px;color:#b91c1c;"></div>
  </div>

  <div id="painel" class="card" style="display:none;">
    <div class="topo">
      <h2 style="margin:0;">Universidades</h2>
      <button class="btn-sec" onclick="logout()">Sair</button>
    </div>

    <br>

    <div class="grid">
      <button class="btn" onclick="abrirUniversidade('estacio', 'Estácio')">Estácio</button>
      <button class="btn" onclick="abrirUniversidade('usp', 'USP')">USP</button>
      <button class="btn" onclick="abrirUniversidade('anhanguera', 'Anhanguera')">Anhanguera</button>
    </div>
  </div>

  <div id="listaAlunos" class="card" style="display:none;">
    <div class="topo">
      <h2 id="tituloUniversidade" style="margin:0;"></h2>
      <button class="btn-sec" onclick="voltar()">⬅ Voltar</button>
    </div>

    <br>

    <div id="alunos"></div>

    <br>

    <button class="btn" onclick="novoAluno()">+ Novo aluno</button>
    <div id="mensagem"></div>
  </div>

</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

let universidadeAtual = "";
let universidadeNomeAtual = "";

async function login(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  const msg = document.getElementById("mensagemLogin");

  const { error } = await banco.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    msg.textContent = "Erro no login: " + error.message;
    return;
  }

  msg.textContent = "";
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("painel").style.display = "block";
}

async function logout(){
  await banco.auth.signOut();
  location.reload();
}

async function abrirUniversidade(slug, nome){
  universidadeAtual = slug;
  universidadeNomeAtual = nome;

  document.getElementById("painel").style.display = "none";
  document.getElementById("listaAlunos").style.display = "block";
  document.getElementById("tituloUniversidade").innerText = nome;

  carregarAlunos();
}

function voltar(){
  document.getElementById("listaAlunos").style.display = "none";
  document.getElementById("painel").style.display = "block";
  document.getElementById("mensagem").innerText = "";
}

async function carregarAlunos(){
  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug", universidadeAtual)
    .order("nome", { ascending: true });

  if(error){
    document.getElementById("mensagem").innerText = "Erro ao carregar alunos.";
    console.error(error);
    return;
  }

  let html = "";

  if(!data || data.length === 0){
    html = `<div class="item-aluno">Nenhum aluno cadastrado.</div>`;
  } else {
    data.forEach(aluno => {
      html += `
        <div class="item-aluno" onclick="abrirAluno(${aluno.id})">
          <strong>${aluno.nome || ""}</strong><br>
          <span>${aluno.curso || ""}</span>
        </div>
      `;
    });
  }

  document.getElementById("alunos").innerHTML = html;
  document.getElementById("mensagem").innerText = "";
}

function abrirAluno(id){
  window.location.href = "aluno.html?id=" + id;
}

function novoAluno(){
  alert("A tela de novo aluno vamos criar no próximo turno.");
}
</script>

</body>
</html>
