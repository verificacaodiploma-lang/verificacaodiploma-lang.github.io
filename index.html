<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel ADM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef3f9;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 10px 24px rgba(0,0,0,.06);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.btn{
  padding:16px;
  background:#005daa;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.btn-sec{
  padding:12px 16px;
  background:#111827;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.item-aluno{
  padding:12px;
  border-bottom:1px solid #e5e7eb;
  cursor:pointer;
  border-radius:6px;
}

.item-aluno:hover{
  background:#f8fafc;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

#mensagem{
  margin-top:10px;
  color:#6b7280;
}

#mensagemLogin{
  margin-top:10px;
  color:#b91c1c;
}

#mensagemReset{
  margin-top:10px;
  font-weight:bold;
}

.badge{
  display:inline-block;
  font-size:12px;
  font-weight:bold;
  margin-top:6px;
}

.busca{
  width:100%;
  padding:12px;
  border:1px solid #d1d5db;
  border-radius:8px;
  font-size:14px;
  margin-bottom:14px;
  box-sizing:border-box;
}

.link-like{
  display:inline-block;
  margin-top:10px;
  color:#005daa;
  cursor:pointer;
  text-decoration:underline;
  font-size:14px;
}

@media (max-width: 640px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div id="loginBox" class="card">
    <h2>Login ADM</h2>

    <input
      id="email"
      type="email"
      placeholder="Email"
      style="width:100%;padding:12px;box-sizing:border-box;"
    >
    <br><br>

    <input
      id="senha"
      type="password"
      placeholder="Senha"
      style="width:100%;padding:12px;box-sizing:border-box;"
    >
    <br><br>

    <button class="btn" onclick="login()">Entrar</button>

    <div class="link-like" onclick="esqueciSenha()">Esqueci minha senha</div>

    <div id="mensagemLogin"></div>
    <div id="mensagemReset"></div>
  </div>

  <div id="painel" class="card" style="display:none;">
    <div class="topo">
      <h2 style="margin:0;">Universidades</h2>
      <button class="btn-sec" onclick="logout()">Sair</button>
    </div>

    <br>

    <div class="grid">
      <button class="btn" onclick="abrirUniversidade('estacio', 'Estácio')">Estácio</button>
      <button class="btn" onclick="abrirUniversidade('usp', 'USP')">USP</button>
      <button class="btn" onclick="abrirUniversidade('anhanguera', 'Anhanguera')">Anhanguera</button>
    </div>
  </div>

  <div id="listaAlunos" class="card" style="display:none;">
    <div class="topo">
      <h2 id="tituloUniversidade" style="margin:0;"></h2>
      <button class="btn-sec" onclick="voltar()">⬅ Voltar</button>
    </div>

    <br>

    <input
      id="buscaAluno"
      class="busca"
      type="text"
      placeholder="Buscar aluno pelo nome"
      oninput="filtrarAlunos()"
    >

    <div id="alunos"></div>

    <br>

    <button class="btn" onclick="novoAluno()">+ Novo aluno</button>

    <div id="mensagem"></div>
  </div>

</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

let universidadeAtual = "";
let alunosCache = [];

async function verificarSessao(){
  const { data, error } = await banco.auth.getSession();

  if(error){
    console.error("Erro ao verificar sessão:", error);
    return;
  }

  if(data.session){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("painel").style.display = "none";
    document.getElementById("listaAlunos").style.display = "none";
  }
}

async function login(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  const msg = document.getElementById("mensagemLogin");
  const resetMsg = document.getElementById("mensagemReset");

  msg.textContent = "";
  resetMsg.textContent = "";

  const { error } = await banco.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    msg.textContent = "Erro no login: " + error.message;
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("painel").style.display = "block";
}

async function esqueciSenha(){
  const email = document.getElementById("email").value.trim();
  const resetMsg = document.getElementById("mensagemReset");
  const loginMsg = document.getElementById("mensagemLogin");

  loginMsg.textContent = "";
  resetMsg.textContent = "";

  if(!email){
    resetMsg.style.color = "red";
    resetMsg.textContent = "Digite seu email para recuperar a senha.";
    return;
  }

  const { error } = await banco.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin
  });

  if(error){
    resetMsg.style.color = "red";
    resetMsg.textContent = "Erro ao enviar recuperação: " + error.message;
    return;
  }

  resetMsg.style.color = "green";
  resetMsg.textContent = "Email de recuperação enviado.";
}

async function logout(){
  await banco.auth.signOut();
  location.reload();
}

async function abrirUniversidade(slug, nome){
  universidadeAtual = slug;

  document.getElementById("painel").style.display = "none";
  document.getElementById("listaAlunos").style.display = "block";
  document.getElementById("tituloUniversidade").innerText = nome;
  document.getElementById("buscaAluno").value = "";

  carregarAlunos();
}

function voltar(){
  document.getElementById("listaAlunos").style.display = "none";
  document.getElementById("painel").style.display = "block";
  document.getElementById("mensagem").innerText = "";
}

async function carregarAlunos(){
  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug", universidadeAtual)
    .order("nome", { ascending: true });

  if(error){
    document.getElementById("mensagem").innerText = "Erro ao carregar alunos.";
    console.error(error);
    return;
  }

  alunosCache = data || [];
  renderizarAlunos(alunosCache);
}

function filtrarAlunos(){
  const termo = document.getElementById("buscaAluno").value.toLowerCase().trim();

  const filtrados = alunosCache.filter(aluno =>
    String(aluno.nome || "").toLowerCase().includes(termo)
  );

  renderizarAlunos(filtrados);
}

function renderizarAlunos(lista){
  let html = "";

  if(!lista || lista.length === 0){
    html = `<div class="item-aluno">Nenhum aluno encontrado.</div>`;
  } else {
    lista.forEach(aluno => {
      const status = aluno.status || "Sem status";
      const statusCor = status.toLowerCase() === "ativo" ? "green" : "blue";

      const aguardandoPagamento = aluno.mensalidade_atrasada
        ? `<span class="badge" style="color:red;">🔴 Aguardando pagamento</span>`
        : `<span class="badge" style="color:green;">🟢 Regular</span>`;

      html += `
        <div class="item-aluno" onclick="abrirAluno(${aluno.id})">
          <strong>${aluno.nome || ""}</strong><br>
          <span>${aluno.curso || ""}</span><br>
          <span class="badge" style="color:${statusCor};">● ${status}</span><br>
          ${aguardandoPagamento}
        </div>
      `;
    });
  }

  document.getElementById("alunos").innerHTML = html;
  document.getElementById("mensagem").innerText = "";
}

function abrirAluno(id){
  window.location.href = "aluno.html?id=" + id;
}

function novoAluno(){
  window.location.href = "novo-aluno.html?universidade=" + universidadeAtual;
}

verificarSessao();
</script>

</body>
</html>
