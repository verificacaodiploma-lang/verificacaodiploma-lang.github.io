<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UNICID — Sistema de Verificação de Diplomas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
:root{
--bg:#f4f8ff;
--card:#ffffff;
--accent:#0072ce;
--muted:#6b7280;
--border:#d9e4f5;
--error:#b91c1c;
--ok:#15803d;
}

body{
font-family:Inter,Arial;
background:var(--bg);
margin:0;
}

header{
background:linear-gradient(90deg,#0072ce15,#0072ce05);
padding:24px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
}

.brand{
font-weight:700;
color:#003b73;
}

.container{
max-width:980px;
margin:36px auto;
padding:20px;
}

.search{
background:#fff;
padding:20px;
border-radius:12px;
display:flex;
gap:16px;
}

input{
flex:1;
padding:14px;
border-radius:8px;
border:1px solid var(--border);
}

button{
background:var(--accent);
color:#fff;
border:none;
padding:14px;
border-radius:8px;
cursor:pointer;
}

.content{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
background:#fff;
padding:22px;
border-radius:12px;
}

.label{
display:inline-block;
margin-top:12px;
padding:6px 12px;
border-radius:8px;
font-weight:700;
}

.ok{ background:#e0fce9;color:var(--ok);}
.warn{ background:#ffe5e5;color:var(--error);}

#qrcode{margin-top:15px;}

canvas{
background:#fff;
border-radius:8px;
}

@media(max-width:820px){
.content{flex-direction:column;}
}
</style>
</head>

<body>

<header>
<div class="brand">UNICID</div>
<div>Portal Acadêmico</div>
</header>

<div class="container">

<div class="search">
<input id="q" placeholder="Digite o número do diploma">
<button onclick="verificar()">Consultar</button>
</div>

<div id="erro" style="color:red;margin-top:10px;"></div>

<div class="content">

<div class="card" style="flex:1">

<h2 id="nome">—</h2>
<div id="curso"></div>
<div id="inst"></div>
<div id="data"></div>

<span id="status" class="label">—</span>

<div style="margin-top:10px;font-weight:bold" id="registro"></div>
<div id="protocolo"></div>

<div id="qrcode"></div>

<button id="printBtn" onclick="imprimir()" style="margin-top:10px;">Imprimir</button>

<div id="bloqueio" style="display:none;color:red;margin-top:10px;">
Aguardando pagamento. Impressão bloqueada.
</div>

</div>

<div class="card">
<canvas id="canvas" width="420" height="260"></canvas>
</div>

</div>

</div>

<script>
const banco = window.supabase.createClient(
"https://fghkqwxhrdodyhvfrlzz.supabase.co",
"sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let atual = null;

function gerarProtocolo(){
return "UNI-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

function normalizar(v){
return String(v).replace(/[^a-zA-Z0-9]/g,"").toUpperCase();
}

function desenhar(d){

ctx.clearRect(0,0,420,260);

ctx.fillStyle="#003b73";
ctx.font="bold 20px Arial";
ctx.fillText("UNICID",160,40);

ctx.font="14px Arial";
ctx.fillText("Universidade Cidade de São Paulo",70,65);

ctx.font="bold 16px Arial";
ctx.fillText(d.nome,40,120);

ctx.font="14px Arial";
ctx.fillText(d.curso,40,150);
ctx.fillText(d.conclusao,40,175);

}

async function verificar(){

const codigo = document.getElementById("q").value.trim();
const erro = document.getElementById("erro");

erro.innerText="";

const { data } = await banco
.from("registros")
.select("*")
.eq("universidade_slug","unicid");

const aluno = data.find(a => normalizar(a.registro) === normalizar(codigo));

if(!aluno){
erro.innerText="Diploma não encontrado.";
return;
}

atual = aluno;

document.getElementById("nome").innerText=aluno.nome;
document.getElementById("curso").innerText=aluno.curso;
document.getElementById("inst").innerText=aluno.universidade;
document.getElementById("data").innerText=aluno.conclusao;
document.getElementById("registro").innerText=aluno.registro;

const protocolo = gerarProtocolo();
document.getElementById("protocolo").innerText=protocolo;

document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text:protocolo,width:100,height:100
});

if(aluno.mensalidade_atrasada){
document.getElementById("status").className="label warn";
document.getElementById("status").innerText="Aguardando pagamento";
document.getElementById("bloqueio").style.display="block";
document.getElementById("printBtn").disabled=true;
}else{
document.getElementById("status").className="label ok";
document.getElementById("status").innerText="Ativo";
document.getElementById("bloqueio").style.display="none";
document.getElementById("printBtn").disabled=false;
}

desenhar(aluno);
}

function imprimir(){
if(atual && atual.mensalidade_atrasada){
alert("Pagamento pendente.");
return;
}
window.print();
}
</script>

</body>
</html>
