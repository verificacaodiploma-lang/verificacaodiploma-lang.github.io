<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USP - Verificação Acadêmica</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  color: #333;
}

/* TOPO */
.topo {
  background: white;
  padding: 15px 20px;
  border-bottom: 1px solid #ddd;
}

.topo strong {
  font-size: 20px;
  color: #0d47a1;
}

/* HERO AZUL */
.hero {
  background: #0d47a1;
  color: white;
  text-align: center;
  padding: 50px 20px;
}

.hero h1 {
  margin: 0;
  font-size: 28px;
}

.hero p {
  margin-top: 10px;
  opacity: 0.9;
}

/* CARD */
.card {
  max-width: 700px;
  margin: -40px auto 40px;
  background: white;
  border-radius: 10px;
  padding: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* TÍTULO */
.card h2 {
  margin-top: 0;
  color: #0d47a1;
}

/* BUSCA */
.busca {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.busca input {
  flex: 1;
  padding: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 15px;
}

.busca input:focus {
  border-color: #0d47a1;
  outline: none;
}

/* BOTÃO */
.busca button {
  padding: 14px 22px;
  border-radius: 6px;
  border: none;
  background: #0d47a1;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.busca button:hover {
  background: #093170;
}

/* RESULTADO */
.resultado {
  margin-top: 25px;
  padding: 20px;
  border-radius: 6px;
  display: none;
  font-size: 14px;
  border: 1px solid #ddd;
}

.sucesso {
  border-left: 5px solid #2e7d32;
  background: #f3faf4;
}

.erro {
  border-left: 5px solid #c62828;
  background: #fff5f5;
}

.bloqueio {
  margin-top: 10px;
  color: #c62828;
  font-weight: bold;
}

#qrcode {
  margin-top: 15px;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin-bottom: 30px;
}
</style>
</head>

<body>

<div class="topo">
  <strong>USP</strong> - Universidade de São Paulo
</div>

<section class="hero">
  <h1>Verificação de Autenticidade</h1>
  <p>Consulte registros acadêmicos oficiais</p>
</section>

<div class="card">
  <h2>Consulta de Diploma</h2>

  <div class="busca">
    <input id="codigo" placeholder="Digite o número do diploma">
    <button onclick="verificar()">Consultar</button>
  </div>

  <div id="resultado" class="resultado"></div>
</div>

<div class="footer">
  Sistema oficial de verificação • Universidade de São Paulo
</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

function gerarProtocolo(){
  return "USP-" + Math.random().toString(36).substring(2, 8).toUpperCase();
}

function normalizar(valor){
  return String(valor || "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .toUpperCase();
}

async function verificar(){

  const codigo = document.getElementById("codigo").value.trim();
  const box = document.getElementById("resultado");

  if(!codigo){
    box.style.display = "block";
    box.className = "resultado erro";
    box.innerHTML = "Informe um código válido.";
    return;
  }

  box.style.display = "block";
  box.className = "resultado";
  box.innerHTML = "Consultando...";

  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug", "usp");

  if(error){
    box.className = "resultado erro";
    box.innerHTML = "Erro ao consultar.";
    return;
  }

  const encontrado = data.find(item =>
    normalizar(item.registro) === normalizar(codigo)
  );

  if(!encontrado){
    box.className = "resultado erro";
    box.innerHTML = "Registro não encontrado.";
    return;
  }

  const protocolo = gerarProtocolo();

  let bloqueio = "";
  let botao = `<button onclick="window.print()">Imprimir</button>`;

  if(encontrado.mensalidade_atrasada){
    bloqueio = `<div class="bloqueio">Aguardando pagamento. Impressão bloqueada.</div>`;
    botao = `<button disabled>Impressão bloqueada</button>`;
  }

  box.className = "resultado sucesso";
  box.innerHTML = `
    <strong>Registro confirmado</strong><br><br>

    Nome: ${encontrado.nome}<br>
    Curso: ${encontrado.curso}<br>
    Instituição: ${encontrado.universidade}<br>
    Conclusão: ${encontrado.conclusao}<br>
    Registro: ${encontrado.registro}<br><br>

    Protocolo: <strong>${protocolo}</strong><br>
    Data: ${new Date().toLocaleString()}<br>

    ${bloqueio}

    <div id="qrcode"></div>
    ${botao}
  `;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: protocolo,
    width: 100,
    height: 100
  });
}
</script>

</body>
</html>
