<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USP - Verificação Acadêmica</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  background: #f1f1f1;
  color: #333;
}

/* BARRA AMARELA */
.gov-barra {
  height: 6px;
  background: #ffcc00;
}

/* HEADER */
.gov-header {
  background: #1351b4;
  color: white;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.gov-logo {
  font-weight: bold;
  font-size: 20px;
  background: white;
  color: #1351b4;
  padding: 6px 10px;
  border-radius: 4px;
}

.gov-titulo {
  font-size: 16px;
  line-height: 1.4;
}

.gov-titulo span {
  font-size: 13px;
  opacity: 0.9;
}

/* CONTAINER */
.gov-container {
  max-width: 800px;
  margin: 50px auto;
  background: white;
  padding: 30px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

.gov-container h2 {
  margin-top: 0;
  color: #1351b4;
}

/* INPUT */
.gov-input {
  width: 100%;
  padding: 14px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 15px;
}

.gov-input:focus {
  border-color: #1351b4;
  outline: none;
}

/* BOTÃO */
.gov-btn {
  margin-top: 15px;
  padding: 14px;
  width: 100%;
  background: #1351b4;
  color: white;
  border: none;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
}

.gov-btn:hover {
  background: #0d47a1;
}

/* RESULTADO */
.resultado {
  margin-top: 25px;
  padding: 20px;
  border-radius: 4px;
  display: none;
  font-size: 14px;
  border: 1px solid #ddd;
}

.sucesso {
  border-left: 5px solid #2e7d32;
  background: #f3faf4;
}

.erro {
  border-left: 5px solid #c62828;
  background: #fff5f5;
}

.bloqueio {
  margin-top: 10px;
  color: #c62828;
  font-weight: bold;
}

#qrcode {
  margin-top: 15px;
}

/* FOOTER */
.gov-footer {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin: 40px 0;
}
</style>
</head>

<body>

<div class="gov-barra"></div>

<header class="gov-header">
  <div class="gov-logo">gov.br</div>
  <div class="gov-titulo">
    Universidade de São Paulo<br>
    <span>Verificação de Autenticidade Acadêmica</span>
  </div>
</header>

<div class="gov-container">
  <h2>Consulta de Registro Acadêmico</h2>

  <label>Número do registro ou diploma</label>
  <input id="codigo" class="gov-input" placeholder="Digite o código">

  <button class="gov-btn" onclick="verificar()">Consultar</button>

  <div id="resultado" class="resultado"></div>
</div>

<div class="gov-footer">
  Sistema oficial de verificação • Universidade de São Paulo
</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

function gerarProtocolo(){
  return "USP-" + Math.random().toString(36).substring(2, 8).toUpperCase();
}

function normalizar(valor){
  return String(valor || "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .toUpperCase();
}

async function verificar(){

  const codigo = document.getElementById("codigo").value.trim();
  const box = document.getElementById("resultado");

  if(!codigo){
    box.style.display = "block";
    box.className = "resultado erro";
    box.innerHTML = "Informe um código válido.";
    return;
  }

  box.style.display = "block";
  box.className = "resultado";
  box.innerHTML = "Consultando...";

  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug", "usp");

  if(error){
    box.className = "resultado erro";
    box.innerHTML = "Erro ao consultar.";
    return;
  }

  const encontrado = data.find(item =>
    normalizar(item.registro) === normalizar(codigo)
  );

  if(!encontrado){
    box.className = "resultado erro";
    box.innerHTML = "Registro não encontrado.";
    return;
  }

  const protocolo = gerarProtocolo();

  let bloqueio = "";
  let botao = `<button class="gov-btn" onclick="window.print()">Imprimir</button>`;

  if(encontrado.mensalidade_atrasada){
    bloqueio = `<div class="bloqueio">Aguardando pagamento. Impressão bloqueada.</div>`;
    botao = `<button class="gov-btn" disabled>Impressão bloqueada</button>`;
  }

  box.className = "resultado sucesso";
  box.innerHTML = `
    <strong>Registro confirmado</strong><br><br>

    Nome: ${encontrado.nome}<br>
    Curso: ${encontrado.curso}<br>
    Instituição: ${encontrado.universidade}<br>
    Conclusão: ${encontrado.conclusao}<br>
    Registro: ${encontrado.registro}<br><br>

    Protocolo de validação: <strong>${protocolo}</strong><br>
    Data da consulta: ${new Date().toLocaleString()}<br>

    ${bloqueio}

    <div id="qrcode"></div>
    ${botao}
  `;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: protocolo,
    width: 100,
    height: 100
  });
}
</script>

</body>
</html>
