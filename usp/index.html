<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USP - Verificação Acadêmica</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  color: #333;
}

/* TOPO */
.topo {
  background: white;
  padding: 15px 20px;
  border-bottom: 1px solid #ddd;
}

.topo strong {
  font-size: 20px;
  color: #0d47a1;
}

/* HERO */
.hero {
  background: #0d47a1;
  color: white;
  text-align: center;
  padding: 50px 20px;
}

.hero h1 {
  margin: 0;
  font-size: 28px;
}

.hero p {
  margin-top: 10px;
  opacity: 0.9;
}

/* CARD */
.card {
  max-width: 700px;
  margin: -40px auto 40px;
  background: white;
  border-radius: 10px;
  padding: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card h2 {
  margin-top: 0;
  color: #0d47a1;
}

/* BUSCA */
.busca {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.busca input {
  flex: 1;
  padding: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 15px;
}

.busca button {
  padding: 14px 22px;
  border-radius: 6px;
  border: none;
  background: #0d47a1;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.busca button:hover {
  background: #093170;
}

/* LOADER */
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #0d47a1;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: girar 1s linear infinite;
  margin: 20px auto;
}

@keyframes girar {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* RESULTADO */
.resultado {
  margin-top: 25px;
  padding: 25px;
  border-radius: 8px;
  display: none;
  border: 1px solid #ddd;
  background: white;
}

.sucesso {
  border-left: 5px solid #2e7d32;
}

.erro {
  border-left: 5px solid #c62828;
  background: #fff5f5;
}

/* ORGANIZAÇÃO */
.titulo-resultado {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 15px;
}

.bloco {
  margin-bottom: 15px;
}

.linha {
  margin-bottom: 6px;
}

/* QR */
.qr-area {
  margin-top: 20px;
  display: flex;
  gap: 20px;
  align-items: center;
}

.qr-info {
  font-size: 13px;
  color: #555;
}

/* BOTÃO */
.btn-imprimir {
  margin-top: 10px;
  padding: 8px 14px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  border-radius: 4px;
  cursor: pointer;
}

.bloqueio {
  margin-top: 10px;
  color: #c62828;
  font-weight: bold;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin-bottom: 30px;
}
</style>
</head>

<body>

<div class="topo">
  <strong>USP</strong> - Universidade de São Paulo
</div>

<section class="hero">
  <h1>Verificação de Autenticidade</h1>
  <p>Consulte registros acadêmicos oficiais</p>
</section>

<div class="card">
  <h2>Consulta de Diploma</h2>

  <div class="busca">
    <input id="codigo" placeholder="Digite o número do diploma">
    <button onclick="verificar()">Consultar</button>
  </div>

  <div id="resultado" class="resultado"></div>
</div>

<div class="footer">
  Sistema oficial de verificação • Universidade de São Paulo
</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

function gerarProtocolo(){
  return "USP-" + Math.random().toString(36).substring(2, 8).toUpperCase();
}

function normalizar(valor){
  return String(valor || "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .toUpperCase();
}

async function verificar(){

  const codigo = document.getElementById("codigo").value.trim();
  const box = document.getElementById("resultado");

  if(!codigo){
    box.style.display = "block";
    box.className = "resultado erro";
    box.innerHTML = "Informe um código válido.";
    return;
  }

  box.style.display = "block";
  box.className = "resultado";
  box.innerHTML = `<div class="loader"></div>`;

  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug", "usp")
    .eq("registro", codigo)
    .single();

  if(error || !data){
    box.className = "resultado erro";
    box.innerHTML = "Registro não encontrado.";
    return;
  }

  const encontrado = data;
  const protocolo = gerarProtocolo();

  let bloqueio = "";
  let botao = `<button class="btn-imprimir" onclick="window.print()">Imprimir</button>`;

  if(encontrado.mensalidade_atrasada){
    bloqueio = `<div class="bloqueio">Aguardando pagamento. Impressão bloqueada.</div>`;
    botao = `<button class="btn-imprimir" disabled>Impressão bloqueada</button>`;
  }

  box.className = "resultado sucesso";
  box.innerHTML = `
    <div class="titulo-resultado">Registro confirmado</div>

    <div class="bloco">
      <div class="linha"><strong>Nome:</strong> ${encontrado.nome}</div>
      <div class="linha"><strong>Curso:</strong> ${encontrado.curso}</div>
      <div class="linha"><strong>Instituição:</strong> ${encontrado.universidade}</div>
      <div class="linha"><strong>Conclusão:</strong> ${encontrado.conclusao}</div>
      <div class="linha"><strong>Registro:</strong> ${encontrado.registro}</div>
    </div>

    <div class="bloco">
      <div class="linha"><strong>Protocolo:</strong> ${protocolo}</div>
      <div class="linha"><strong>Data:</strong> ${new Date().toLocaleString()}</div>
    </div>

    ${bloqueio}

    <div class="qr-area">
      <div id="qrcode"></div>

      <div class="qr-info">
        Código de validação<br>
        Utilize este QR para autenticar o registro
        <br><br>
        ${botao}
      </div>
    </div>
  `;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: protocolo,
    width: 100,
    height: 100
  });
}
</script>

</body>
</html>
