<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USP - Consulta de Diploma</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f0f0f0;
}

/* BARRA AMARELA */
.top-bar {
  height: 6px;
  background: #f2c94c;
}

/* HEADER */
.header {
  background: #1f8a94;
  color: white;
  padding: 20px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

/* BUSCA TOPO */
.search-top {
  margin-top: 15px;
}

.search-top input {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
}

/* BREADCRUMB */
.breadcrumb {
  padding: 10px 20px;
  font-size: 13px;
  color: #444;
}

/* CARD */
.card {
  max-width: 700px;
  margin: 20px auto;
  background: white;
  border-radius: 8px;
  padding: 20px;
}

.card h2 {
  margin-top: 0;
}

/* FORM */
.form-group {
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  background: #1f8a94;
  color: white;
  border: none;
  cursor: pointer;
}

/* RESULTADO */
.resultado {
  margin-top: 20px;
  padding: 15px;
  border-left: 5px solid green;
  background: #f9f9f9;
  display: none;
}

.erro {
  border-left: 5px solid red;
}

/* QR */
.qr {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="top-bar"></div>

<div class="header">
  <h1>USP</h1>

  <div class="search-top">
    <input placeholder="Qual serviço você deseja utilizar?">
  </div>
</div>

<div class="breadcrumb">
  Home / Serviços / Diplomas / Consulta Pública
</div>

<div class="card">
  <h2>Diplomas</h2>

  <p><strong>Consulta Pública</strong> - Confirmação do registro do diploma</p>

  <div class="form-group">
    <label>Número do registro</label>
    <input id="codigo">
  </div>

  <button onclick="verificar()">Consultar</button>

  <div id="resultado" class="resultado"></div>
</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

function gerarProtocolo(){
  return "USP-" + Math.random().toString(36).substring(2, 8).toUpperCase();
}

async function verificar(){
  const codigo = document.getElementById("codigo").value.trim();
  const box = document.getElementById("resultado");

  if(!codigo){
    box.style.display = "block";
    box.className = "resultado erro";
    box.innerHTML = "Informe um código.";
    return;
  }

  box.style.display = "block";
  box.innerHTML = "Consultando...";

  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("registro", codigo)
    .single();

  if(error || !data){
    box.className = "resultado erro";
    box.innerHTML = "Registro não encontrado.";
    return;
  }

  const protocolo = gerarProtocolo();

  box.className = "resultado";
  box.innerHTML = `
    <strong>Registro confirmado</strong><br><br>
    Nome: ${data.nome}<br>
    Curso: ${data.curso}<br>
    Instituição: ${data.universidade}<br>
    Conclusão: ${data.conclusao}<br>
    Registro: ${data.registro}<br><br>

    Protocolo: ${protocolo}<br>

    <div id="qrcode" class="qr"></div>
  `;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: protocolo,
    width: 100,
    height: 100
  });
}
</script>

</body>
</html>
