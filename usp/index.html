<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Consulta de Diploma</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f0f0f0;
}

/* aviso */
.aviso{
  font-size:11px;
  text-align:center;
  background:#eee;
  padding:4px;
  color:#666;
}

/* topo */
.barra{
  height:5px;
  background:#f2c94c;
}

.header{
  background:#1f8a94;
  padding:20px;
  color:white;
}

.logo{
  font-size:26px;
  font-weight:bold;
}

/* busca */
.search{
  margin-top:15px;
}
.search input{
  width:100%;
  padding:12px 18px;
  border-radius:25px;
  border:none;
}

/* breadcrumb */
.breadcrumb{
  padding:10px 20px;
  font-size:13px;
  color:#444;
}

/* card */
.card{
  max-width:680px;
  margin:20px auto;
  background:white;
  border-radius:8px;
  padding:20px;
}

.title{
  font-size:22px;
  font-weight:bold;
  border-left:4px solid #f2c94c;
  padding-left:10px;
}

.sub{
  color:#777;
  margin-bottom:10px;
}

/* form */
input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  margin-top:5px;
}

label{
  font-size:13px;
}

button{
  margin-top:15px;
  padding:10px 20px;
  background:#1f8a94;
  color:white;
  border:none;
  cursor:pointer;
}

/* resultado */
.resultado{
  margin-top:20px;
  padding:20px;
  border-left:5px solid #2e7d32;
  background:#fafafa;
  display:none;
}

.erro{
  border-left:5px solid #c62828;
}

/* organização */
.bloco{margin-bottom:15px;}
.linha{margin-bottom:5px;}

/* QR */
.qr{
  display:flex;
  gap:15px;
  margin-top:15px;
  align-items:center;
}

/* botão imprimir */
.btn {
  margin-top: 10px;
  padding: 8px 14px;
  background: #1f8a94;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 3px;
}

.btn:hover {
  background: #166d74;
}

/* IMPRESSÃO LIMPA */
@media print {
  body * {
    visibility: hidden;
  }

  #area-impressao, #area-impressao * {
    visibility: visible;
  }

  #area-impressao {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 40px;
    background: white;
  }
}
</style>
</head>

<body>

<div class="aviso">Verificação pública de diplomas a partir de 2019</div>

<div class="barra"></div>

<div class="header">
  <div class="logo">USP</div>

  <div class="search">
    <input placeholder="Qual serviço você deseja utilizar?">
  </div>
</div>

<div class="breadcrumb">
  Home / Serviços / Diplomas / Consulta Pública
</div>

<div class="card">
  <div class="title">Diplomas</div>
  <div class="sub">USP</div>

  <p>Consulta pública para confirmação de registro.</p>

  <label>Nome completo</label>
  <input id="nome">

  <label>Processo (opcional)</label>
  <input id="processo">

  <label>Registro</label>
  <input id="codigo">

  <button onclick="verificar()">Consultar</button>

  <div id="resultado" class="resultado"></div>
</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

function gerarProtocolo(){
  return "USP-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

async function verificar(){

  const codigo = document.getElementById("codigo").value.trim();
  const box = document.getElementById("resultado");

  if(!codigo){
    box.style.display="block";
    box.className="resultado erro";
    box.innerHTML="Informe o registro.";
    return;
  }

  box.style.display="block";
  box.innerHTML="Consultando...";

  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("registro", codigo)
    .single();

  if(error || !data){
    box.className="resultado erro";
    box.innerHTML="Registro não encontrado.";
    return;
  }

  const protocolo = gerarProtocolo();

  box.className="resultado";

  box.innerHTML = `
    <div id="area-impressao">

      <div class="bloco"><strong>Registro confirmado</strong></div>

      <div class="bloco">
        <div class="linha"><b>Nome:</b> ${data.nome}</div>
        <div class="linha"><b>Curso:</b> ${data.curso}</div>
        <div class="linha"><b>Instituição:</b> ${data.universidade}</div>
        <div class="linha"><b>Conclusão:</b> ${data.conclusao}</div>
        <div class="linha"><b>Registro:</b> ${data.registro}</div>
      </div>

      <div class="bloco">
        <div class="linha"><b>Protocolo:</b> ${protocolo}</div>
        <div class="linha"><b>Data:</b> ${new Date().toLocaleString()}</div>
      </div>

      <div class="qr">
        <div id="qrcode"></div>
      </div>

    </div>

    <button class="btn" onclick="window.print()">Imprimir</button>
  `;

  document.getElementById("qrcode").innerHTML="";

  new QRCode(document.getElementById("qrcode"),{
    text:protocolo,
    width:100,
    height:100
  });
}
</script>

</body>
</html>
