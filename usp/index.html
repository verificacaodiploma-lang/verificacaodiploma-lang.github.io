<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USP - Verificação Acadêmica</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
:root {
  --gov-azul: #1351b4;
  --gov-amarelo: #f2c94c;
  --gov-cinza-escuro: #4a4a4a;
  --gov-cinza-claro: #f2f2f2;
  --gov-card: #ffffff;
  --gov-borda: #dcdcdc;
}

body {
  margin: 0;
  background: var(--gov-cinza-claro);
  font-family: Arial, sans-serif;
  color: var(--gov-cinza-escuro);
}

header {
  background: var(--gov-azul);
  color: white;
  padding: 18px 24px;
  font-size: 22px;
  font-weight: 700;
}

.container {
  max-width: 760px;
  margin: 40px auto;
  background: var(--gov-card);
  padding: 30px;
  border-radius: 6px;
  border: 1px solid var(--gov-borda);
}

h2 {
  color: var(--gov-azul);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 4px;
  border: 1px solid var(--gov-borda);
  margin-top: 6px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: var(--gov-azul);
  color: white;
  border: none;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
}

.resultado {
  margin-top: 25px;
  padding: 18px;
  border-radius: 4px;
  border: 1px solid var(--gov-borda);
  display: none;
}

.sucesso {
  background: #e6f4ea;
  border-left: 4px solid #2e7d32;
}

.erro {
  background: #fdecea;
  border-left: 4px solid #c62828;
}

.bloqueio {
  margin-top: 12px;
  color: #b91c1c;
  font-weight: bold;
}

#qrcode {
  margin-top: 15px;
}

</style>
</head>

<body>

<header>Universidade de São Paulo - USP</header>

<div class="container">
  <h2>Consulta de Registro Acadêmico</h2>

  <input id="codigo" type="text" placeholder="Digite o código do registro">
  <button onclick="verificar()">Consultar</button>

  <div id="resultado" class="resultado"></div>
</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

function gerarProtocolo(){
  return "USP-" + Math.random().toString(36).substring(2, 8).toUpperCase();
}

function normalizar(valor){
  return String(valor || "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .toUpperCase();
}

async function verificar(){

  const codigo = document.getElementById("codigo").value.trim();
  const box = document.getElementById("resultado");

  if(!codigo){
    box.style.display = "block";
    box.className = "resultado erro";
    box.innerHTML = "Informe um código válido.";
    return;
  }

  const { data, error } = await banco
    .from("registros")
    .select("*")
    .eq("universidade_slug", "usp");

  if(error){
    box.style.display = "block";
    box.className = "resultado erro";
    box.innerHTML = "Erro ao consultar.";
    return;
  }

  const encontrado = data.find(item =>
    normalizar(item.registro) === normalizar(codigo)
  );

  if(!encontrado){
    box.style.display = "block";
    box.className = "resultado erro";
    box.innerHTML = "Registro não encontrado.";
    return;
  }

  const protocolo = gerarProtocolo();

  let bloqueio = "";
  let botao = `<button onclick="window.print()">Imprimir</button>`;

  if(encontrado.mensalidade_atrasada){
    bloqueio = `<div class="bloqueio">Aguardando pagamento. Impressão bloqueada.</div>`;
    botao = `<button disabled>Impressão bloqueada</button>`;
  }

  box.style.display = "block";
  box.className = "resultado sucesso";
  box.innerHTML = `
    <strong>Registro encontrado</strong><br><br>
    Nome: ${encontrado.nome}<br>
    Curso: ${encontrado.curso}<br>
    Instituição: ${encontrado.universidade}<br>
    Conclusão: ${encontrado.conclusao}<br>
    Registro: ${encontrado.registro}<br><br>
    Protocolo: ${protocolo}
    ${bloqueio}
    <div id="qrcode"></div>
    ${botao}
  `;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: protocolo,
    width: 100,
    height: 100
  });
}
</script>

</body>
</html>
