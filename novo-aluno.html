<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Novo Aluno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef3f9;
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:12px;
}

h2{
  margin-top:0;
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  background:#005daa;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.topo{
  margin-bottom:15px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="topo" id="universidadeNome"></div>

    <h2>Cadastrar Novo Aluno</h2>

    <input id="nome" placeholder="Nome do aluno">

    <input id="curso" placeholder="Curso">

    <input id="registro" placeholder="Número de registro">

    <label>Data de conclusão</label>
    <input type="date" id="conclusao">

    <input id="polo" placeholder="Polo">

    <select id="status">
      <option value="Ativo">Ativo</option>
      <option value="Concluído">Concluído</option>
    </select>

    <label>
      <input type="checkbox" id="mensalidade">
      Mensalidade atrasada
    </label>

    <textarea id="obs" placeholder="Observações (opcional)"></textarea>

    <button onclick="salvar()">Salvar aluno</button>

  </div>
</div>

<script>
const banco = window.supabase.createClient(
  "https://fghkqwxhrdodyhvfrlzz.supabase.co",
  "sb_publishable_cwIQcgCl1O0z_CKo6E8xUQ_Y-VoPyve"
);

// pegar universidade da URL
const params = new URLSearchParams(window.location.search);
const universidade = params.get("universidade") || "estacio";

// mostrar nome bonito
const nomes = {
  estacio: "Estácio",
  usp: "USP",
  anhanguera: "Anhanguera"
};

document.getElementById("universidadeNome").innerText =
  "Universidade: " + (nomes[universidade] || universidade);

async function salvar(){

  const nome = document.getElementById("nome").value;
  const curso = document.getElementById("curso").value;
  const registro = document.getElementById("registro").value;
  const conclusao = document.getElementById("conclusao").value;
  const polo = document.getElementById("polo").value;
  const status = document.getElementById("status").value;
  const mensalidade = document.getElementById("mensalidade").checked;
  const obs = document.getElementById("obs").value;

  if(!nome || !registro){
    alert("Preencha nome e registro");
    return;
  }

  const { error } = await banco.from("registros").insert({
    nome: nome,
    curso: curso,
    registro: registro,
    conclusao: conclusao,
    polo: polo,
    status: status,
    mensalidade_atrasada: mensalidade,
    observacoes: obs,
    universidade_slug: universidade,
    universidade: nomes[universidade] || universidade
  });

  if(error){
    alert("Erro ao salvar");
    console.log(error);
    return;
  }

  alert("Aluno cadastrado com sucesso!");

  window.location.href = "index.html";
}
</script>

</body>
</html>
